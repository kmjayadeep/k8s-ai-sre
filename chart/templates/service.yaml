apiVersion: v1
kind: Service
metadata:
  name: {{ include "k8s-ai-sre.fullname" . }}
  namespace: {{ include "k8s-ai-sre.namespace" . }}
  labels:
    {{- include "k8s-ai-sre.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  ports:
    - port: {{ .Values.service.port | default 80 }}
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    {{- include "k8s-ai-sre.selectorLabels" . | nindent 4 }}
