{{/*
Secret: two modes controlled by secretMode ('auto', 'existing', 'inline').
  existing: reference existingSecret.name only
  inline:   create a Secret from secretData
  auto:     if existingSecret.name is set, reference it; otherwise inline
*/}}
{{- $secretMode := .Values.secretMode | default "auto" -}}
{{- $existingName := .Values.existingSecret.name -}}
{{- $useInline := false -}}
{{- if eq $secretMode "inline" }}
{{-   $useInline = true }}
{{- else if and (eq $secretMode "auto") (not $existingName) }}
{{-   $useInline = true }}
{{- else if and (eq $secretMode "auto") $existingName }}
{{-   $useInline = false }}
{{- else if and (eq $secretMode "existing") (not $existingName) }}
{{-   $useInline = true }}
{{- end }}

{{- if $useInline }}
{{- if .Values.secretData }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "k8s-ai-sre.secretName" . }}
  namespace: {{ include "k8s-ai-sre.namespace" . }}
  labels:
    {{- include "k8s-ai-sre.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.secretData }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
{{- end }}
