{{- if .Values.namespace.create }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ include "k8s-ai-sre.namespace" . }}
  labels:
    {{- include "k8s-ai-sre.labels" . | nindent 4 }}
    {{- with .Values.namespace.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.namespace.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
