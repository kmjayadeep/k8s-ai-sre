# Example: install with inline secret (credentials declared in values)
# Suitable for homelab / single-tenant setups.

namespace:
  name: ai-sre-system
  create: true

image:
  repository: ghcr.io/kmjayadeep/k8s-ai-sre
  tag: main
  pullPolicy: Always

writeAllowedNamespaces:
  - ai-sre-demo
  # Add more namespaces as needed, e.g.:
  # - production
  # - staging

# Inline secret — credentials are stored in the Secret manifest.
# For production, use existingSecret.name instead.
secretMode: inline

secretData:
  PORTKEY_API_KEY: "your-portkey-api-key"
  MODEL_NAME: "openai/gpt-oss-20b"
  MODEL_PROVIDER: "groq"
  MODEL_BASE_URL: "https://api.portkey.ai/v1"
  WRITE_ALLOWED_NAMESPACES: "ai-sre-demo"
  # Uncomment and fill to enable Telegram notifications:
  # TELEGRAM_BOT_TOKEN: "123456:ABCdefGhIJKlmNoPQRsTUVwxYZ"
  # TELEGRAM_CHAT_ID: "12345678"
  # TELEGRAM_ALLOWED_CHAT_IDS: "12345678"
  # Uncomment to enable HTTP operator API:
  # OPERATOR_API_TOKEN: "your-operator-token"

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

