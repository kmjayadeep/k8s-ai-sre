# Example: install using an existing Secret (credentials managed separately).
# The Secret must already exist in the target namespace.
# Suitable for production / multi-tenant setups.

namespace:
  name: ai-sre-system
  create: true

image:
  repository: ghcr.io/kmjayadeep/k8s-ai-sre
  tag: main
  pullPolicy: Always

writeAllowedNamespaces:
  - ai-sre-demo
  # Add more namespaces as needed

# Use an existing Secret instead of creating one.
# The Secret must contain these keys (see docs/deployment.md for full list):
#   PORTKEY_API_KEY  (or MODEL_API_KEY)
#   MODEL_NAME
#   WRITE_ALLOWED_NAMESPACES
secretMode: existing

existingSecret:
  name: "k8s-ai-sre-env"   # <-- change this if your secret has a different name

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Optional: enable pod disruption budget for controlled disruptions
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Optional: run multiple replicas for HA
# replicaCount: 2
# podAntiAffinity: true
