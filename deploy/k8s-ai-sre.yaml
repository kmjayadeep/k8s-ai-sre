apiVersion: v1
kind: Namespace
metadata:
  name: ai-sre-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-ai-sre
  namespace: ai-sre-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-ai-sre-read
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-ai-sre-read
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-ai-sre-read
subjects:
  - kind: ServiceAccount
    name: k8s-ai-sre
    namespace: ai-sre-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: k8s-ai-sre-write
  namespace: ai-sre-demo
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k8s-ai-sre-write
  namespace: ai-sre-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: k8s-ai-sre-write
subjects:
  - kind: ServiceAccount
    name: k8s-ai-sre
    namespace: ai-sre-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-ai-sre
  namespace: ai-sre-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-ai-sre
  template:
    metadata:
      labels:
        app: k8s-ai-sre
    spec:
      serviceAccountName: k8s-ai-sre
      containers:
        - name: app
          image: ghcr.io/kmjayadeep/k8s-ai-sre:main
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: k8s-ai-sre-env
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-ai-sre
  namespace: ai-sre-system
spec:
  selector:
    app: k8s-ai-sre
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
