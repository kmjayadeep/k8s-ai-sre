apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-ai-sre
  namespace: ai-sre-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-ai-sre
  template:
    metadata:
      labels:
        app: k8s-ai-sre
    spec:
      serviceAccountName: k8s-ai-sre
      containers:
        - name: app
          image: ghcr.io/kmjayadeep/k8s-ai-sre:main
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: k8s-ai-sre-env
          ports:
            - containerPort: 8080
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-ai-sre
  namespace: ai-sre-system
spec:
  selector:
    app: k8s-ai-sre
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
