apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-ai-sre
  namespace: ai-sre-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-ai-sre
  template:
    metadata:
      labels:
        app: k8s-ai-sre
    spec:
      serviceAccountName: k8s-ai-sre
      containers:
        - name: app
          image: ghcr.io/kmjayadeep/k8s-ai-sre:main
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: k8s-ai-sre-env
          env:
            - name: TELEGRAM_POLL_ENABLED
              value: "true"
            - name: TELEGRAM_POLL_TIMEOUT_SECONDS
              value: "30"
            - name: TELEGRAM_HTTP_TIMEOUT_SECONDS
              value: "35"
            - name: TELEGRAM_POLL_INTERVAL_SECONDS
              value: "1"
            - name: TELEGRAM_POLL_BACKOFF_SECONDS
              value: "5"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-ai-sre
  namespace: ai-sre-system
spec:
  selector:
    app: k8s-ai-sre
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
