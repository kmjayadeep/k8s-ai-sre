name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Run smoke workflow
        run: scripts/smoke.sh

  full-baseline:
    name: Full Baseline
    runs-on: ubuntu-latest
    needs: smoke

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Run baseline test workflow
        run: scripts/baseline.sh

  manifests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: v5.4.2

      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION="0.6.7"
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" -o /tmp/kubeconform.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp kubeconform
          sudo mv /tmp/kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Helm lint chart
        run: helm lint chart

      - name: Render manifests
        run: |
          helm template k8s-ai-sre ./chart --namespace ai-sre-system > /tmp/chart-rendered.yaml
          kustomize build deploy > /tmp/deploy-rendered.yaml

      - name: Validate rendered manifests
        run: |
          kubeconform -strict -summary -ignore-missing-schemas /tmp/chart-rendered.yaml
          kubeconform -strict -summary -ignore-missing-schemas /tmp/deploy-rendered.yaml
