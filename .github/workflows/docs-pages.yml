name: Docs Pages

on:
  pull_request:
    paths:
      - docs/**
      - mkdocs.yml
      - README.md
      - TESTING.md
      - PLAN.md
      - .github/workflows/docs-pages.yml
  push:
    branches:
      - main
    paths:
      - docs/**
      - mkdocs.yml
      - README.md
      - TESTING.md
      - PLAN.md
      - .github/workflows/docs-pages.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Build docs
        run: uvx --with mkdocs mkdocs build --strict

      - name: Upload site artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: build

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
