<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">k8s-ai-sre architecture overview</title>
  <desc id="desc">Flow from alert intake to investigation, proposal, human approval, and guarded execution on Kubernetes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="55%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0,0 12,4 0,8" fill="#2563eb"/>
    </marker>
    <style>
      .title { font: 700 36px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .card-title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .card-body { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .label { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #1e3a8a; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="720" fill="url(#bg)"/>

  <text x="60" y="70" class="title">k8s-ai-sre Incident Loop</text>
  <text x="60" y="102" class="subtitle">Alert intake -> evidence -> proposal -> approval -> guarded kubectl action</text>

  <rect x="70" y="170" width="220" height="110" rx="18" fill="url(#card)" stroke="#bfdbfe" stroke-width="2"/>
  <text x="90" y="210" class="card-title">1. Intake</text>
  <text x="90" y="236" class="card-body">/investigate</text>
  <text x="90" y="256" class="card-body">/webhooks/alertmanager</text>

  <rect x="350" y="170" width="240" height="110" rx="18" fill="url(#card)" stroke="#bfdbfe" stroke-width="2"/>
  <text x="370" y="210" class="card-title">2. Investigate</text>
  <text x="370" y="236" class="card-body">kubectl reads + events + logs</text>
  <text x="370" y="256" class="card-body">optional Prometheus queries</text>

  <rect x="650" y="170" width="230" height="110" rx="18" fill="url(#card)" stroke="#bfdbfe" stroke-width="2"/>
  <text x="670" y="210" class="card-title">3. Propose</text>
  <text x="670" y="236" class="card-body">draft pending actions</text>
  <text x="670" y="256" class="card-body">store incident + action IDs</text>

  <rect x="940" y="170" width="190" height="110" rx="18" fill="url(#card)" stroke="#bfdbfe" stroke-width="2"/>
  <text x="960" y="210" class="card-title">4. Notify</text>
  <text x="960" y="236" class="card-body">Telegram bot</text>
  <text x="960" y="256" class="card-body">operator review</text>

  <rect x="350" y="390" width="260" height="120" rx="18" fill="url(#card)" stroke="#86efac" stroke-width="2"/>
  <text x="370" y="430" class="card-title">5. Approve / Reject</text>
  <text x="370" y="456" class="card-body">/approve &lt;action-id&gt;</text>
  <text x="370" y="476" class="card-body">/reject &lt;action-id&gt;</text>

  <rect x="680" y="390" width="290" height="120" rx="18" fill="url(#card)" stroke="#86efac" stroke-width="2"/>
  <text x="700" y="430" class="card-title">6. Guarded Execute</text>
  <text x="700" y="456" class="card-body">delete-pod | rollout-restart</text>
  <text x="700" y="476" class="card-body">scale | rollout-undo</text>

  <rect x="990" y="390" width="150" height="120" rx="18" fill="url(#card)" stroke="#fdba74" stroke-width="2"/>
  <text x="1010" y="430" class="card-title">7. Target</text>
  <text x="1010" y="456" class="card-body">Kubernetes API</text>
  <text x="1010" y="476" class="card-body">(kubectl)</text>

  <line x1="290" y1="225" x2="350" y2="225" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="590" y1="225" x2="650" y2="225" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="880" y1="225" x2="940" y2="225" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>

  <line x1="1035" y1="280" x2="1035" y2="360" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="940" y1="450" x2="990" y2="450" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="610" y1="450" x2="680" y2="450" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M 350 450 C 250 450, 210 350, 210 280" fill="none" stroke="#0284c7" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  <text x="120" y="365" class="label">feedback: next investigation informed by outcomes</text>
</svg>
